# Taplo formatting config — pinned so reformats are stable across machines.
# Reference: https://taplo.tamasfe.dev/configuration/formatter-options.html

include = [ "**/*.toml" ]
exclude = [
  ".venv/**",
  "node_modules/**",
  "docs/node_modules/**",
  "docs/dist/**",
  "docs/.astro/**",
]

[formatting]
align_entries = false
align_comments = true
array_trailing_comma = true
array_auto_expand = true
array_auto_collapse = false
compact_arrays = false
compact_inline_tables = false
inline_table_expand = true
trailing_newline = true
column_width = 100
indent_string = "  "
indent_tables = false
reorder_keys = false
reorder_arrays = false
allowed_blank_lines = 2
