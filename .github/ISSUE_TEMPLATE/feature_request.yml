name: Feature request
description: Propose a new capability.
labels: ["type/feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain is this solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How will we know it works?
