[env]
AF_IMAGE_PROFILE = "monorepo-agent-dev"
NODE_OPTIONS = "--max-old-space-size=4096"
NPM_CONFIG_AUDIT = "false"
NPM_CONFIG_FUND = "false"

[tools]
# Python side
python = "3.13.3"
uv = "0.7.8"
"pipx:ruff" = "latest"
"pipx:mypy" = "latest"
"pipx:pre-commit" = "latest"

# Node side
node = "24.0.0"
"npm:pnpm" = "10.11.0"
"npm:typescript" = "5.8.3"
"npm:@biomejs/biome" = "1.9.4"
"npm:knip" = "5.58.0"
"npm:turbo" = "2.5.0"
"npm:nx" = "20.7.2"

# Repo navigation tooling — heavy use in monorepos
"aqua:tj-actions/changed-files" = "47.0.0"

[tasks.deps]
description = "Install both Python and Node dependencies."
run = """
uv sync --frozen
pnpm install --frozen-lockfile
"""

[tasks.format-check]
run = """
ruff format --check .
pnpm biome check . || pnpm lint
"""

[tasks.lint]
run = """
ruff check .
pnpm lint
"""

[tasks.typecheck]
run = """
mypy src tests || pyright || true
pnpm typecheck
"""

[tasks.test]
run = """
pytest -q
pnpm test
"""

[tasks.test-affected]
description = "Run only tests for files changed since the merge-base with main."
run = """
# Use turbo/nx if present, else fall back to running everything.
if [ -f turbo.json ]; then
  pnpm turbo run test --filter='[origin/main...HEAD]'
elif [ -f nx.json ]; then
  pnpm nx affected --target=test --base=origin/main
else
  pnpm test
fi
pytest -q
"""

[tasks.precommit-check]
run = "pre-commit run --all-files"

[tasks.af-validate-fast]
depends = [
  "format-check",
  "lint",
  "typecheck",
  "test-affected",
  "precommit-check",
]

[tasks.af-validate-ci]
depends = [
  "format-check",
  "lint",
  "typecheck",
  "test",
  "precommit-check",
]
