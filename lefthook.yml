min_version: 1.11.0

pre-commit:
  parallel: true
  jobs:
    - name: ruff-format
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
      stage_fixed: true

    - name: ruff-lint
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true

    - name: ty
      glob: "*.py"
      run: uv run ty check {staged_files}

    - name: taplo
      glob: "*.toml"
      run: taplo format --check {staged_files}

    - name: markdownlint
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}

    - name: gitleaks
      run: gitleaks git --pre-commit --staged --redact --verbose

    - name: hadolint
      glob: "Dockerfile*"
      run: hadolint {staged_files}

commit-msg:
  jobs:
    - name: conventional-commit
      run: |
        uv run python scripts/check_commit_msg.py {1}

pre-push:
  jobs:
    - name: tests
      run: uv run pytest --no-cov -q

    - name: typecheck
      run: uv run ty check src tests

    - name: secret-scan-history
      run: gitleaks git --redact --verbose
