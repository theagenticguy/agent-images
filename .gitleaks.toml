# Extends the default gitleaks ruleset with project-specific allowlists.
# Default rules are inherited automatically.

title = "agent-images gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project allowlist."
paths = [
  '''.*\.lock$''',
  '''docs/.*\.md$''',
  '''tests/fixtures/.*''',
  '''\.env\.example''',
]
regexes = [ '''AGENT_IMAGES_LOG_LEVEL=INFO''' ]
